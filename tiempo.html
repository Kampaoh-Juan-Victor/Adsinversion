<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="index, follow">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kampaoh · Tiempo</title>
  <style>
    :root {
      --bg:      #f4f6ff;
      --surface: #ffffff;
      --surface2:#eef0fa;
      --border:  #dde1f0;
      --text:    #1a1d2e;
      --muted:   #6870a0;
      --accent:  #6366f1;
      --amber:   #d97706;
      --red:     #dc2626;
      --blue:    #2563eb;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; font-size: 14px; }

    /* ── Header / Nav ── */
    header { background: var(--surface2); border-bottom: 1px solid var(--border); padding: 14px 32px; display: flex; justify-content: space-between; align-items: center; }
    .header-title { font-size: 15px; font-weight: 700; }
    .header-title span { color: var(--accent); }
    .header-meta { font-size: 11px; color: var(--muted); display: flex; gap: 14px; }
    nav { background: var(--surface2); border-bottom: 1px solid var(--border); padding: 0 32px; display: flex; overflow-x: auto; }
    .nav-link { padding: 10px 16px; font-size: 12px; font-weight: 600; color: var(--muted); text-decoration: none; border-bottom: 2px solid transparent; white-space: nowrap; }
    .nav-link.active { color: var(--accent); border-bottom-color: var(--accent); }
    .nav-link:hover { color: var(--text); }

    /* ── Controls ── */
    .controls-bar { background: var(--surface2); border-bottom: 1px solid var(--border); padding: 10px 32px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .btn-group { display: flex; gap: 3px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 3px; }
    .btn { padding: 5px 14px; font-size: 12px; font-weight: 600; background: transparent; border: none; color: var(--muted); border-radius: 6px; cursor: pointer; transition: all .15s; }
    .btn.active { background: var(--accent); color: #fff; }
    .btn:hover:not(.active) { color: var(--text); }
    .sep { width: 1px; background: var(--border); margin: 0 4px; align-self: stretch; }
    .filter-pill { padding: 4px 12px; font-size: 11px; font-weight: 600; background: transparent; border: 1px solid var(--border); color: var(--muted); border-radius: 20px; cursor: pointer; transition: all .15s; }
    .filter-pill.active { background: #1e2140; border-color: var(--accent); color: var(--accent); }
    .filter-pill:hover:not(.active) { border-color: #404560; color: var(--text); }
    .wind-legend { display: flex; gap: 10px; align-items: center; margin-left: auto; font-size: 10px; color: var(--muted); }
    .wl-item { display: flex; align-items: center; gap: 3px; }
    .filter-label { font-size: 11px; font-weight: 700; color: var(--muted); white-space: nowrap; }

    /* ── Alert strip ── */
    .alert-strip { padding: 10px 32px; background: #fff5f5; border-bottom: 1px solid #fecaca; display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
    .alert-strip-title { font-size: 11px; font-weight: 700; color: var(--red); white-space: nowrap; margin-right: 6px; }
    .a-chip { display: inline-flex; align-items: center; gap: 4px; padding: 3px 9px; border-radius: 7px; font-size: 11px; border: 1px solid; }
    .a-chip .dest { font-weight: 700; color: var(--text); }
    .a-chip .info { color: var(--muted); }
    .a-chip.wind  { background: #e0f8ff; border-color: #7dd3fc; }
    .a-chip.rain  { background: #eff6ff; border-color: #93c5fd; }
    .a-chip.snow  { background: #f0f2ff; border-color: #a5b4fc; }
    .a-chip.heat  { background: #fff1f1; border-color: #fca5a5; }
    .a-chip.cold  { background: #f0f2ff; border-color: #a5b4fc; }
    .a-chip.storm { background: #f5f3ff; border-color: #c4b5fd; }

    /* ── Loading ── */
    .loading { text-align: center; padding: 80px 32px; color: var(--muted); }
    .spinner { width: 26px; height: 26px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Table wrapper ── */
    .table-outer { padding: 20px 0 48px; }
    .table-scroll { overflow-x: auto; overflow-y: visible; }

    /* ── Table ── */
    table { border-collapse: collapse; min-width: 100%; }
    thead th { background: var(--surface2); border-bottom: 2px solid var(--border); position: sticky; top: 0; z-index: 10; }
    th.th-name {
      text-align: left; padding: 8px 14px 8px 32px;
      font-size: 11px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--muted);
      min-width: 170px; max-width: 170px; width: 170px;
      position: sticky; left: 0; z-index: 20;
      background: var(--surface2);
    }
    th.th-day {
      text-align: center; padding: 6px 4px;
      min-width: 78px; width: 78px;
      border-left: 1px solid var(--border);
    }
    th.th-day.today { background: #6366f118; }
    .dh-lbl { font-size: 11px; font-weight: 700; color: var(--text); }
    .dh-date { font-size: 10px; color: var(--muted); margin-top: 1px; }

    /* Destination row */
    tr.tr-dest { border-bottom: 1px solid #2a2d42; }
    tr.tr-dest:hover td { background: #1e2238 !important; }
    tr.tr-dest:hover td.td-name { background: #1e2238 !important; }
    tr.tr-dest.has-alert td.td-name { border-left: 2px solid #ef444450; }

    /* Region separator row */
    tr.tr-region td {
      background: var(--surface2);
      padding: 5px 14px 5px 32px;
      font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--muted);
      border-top: 2px solid var(--border);
      border-bottom: 1px solid var(--border);
    }

    /* Name cell */
    td.td-name {
      position: sticky; left: 0; z-index: 5;
      background: var(--surface);
      padding: 6px 12px 6px 30px;
      min-width: 170px; max-width: 170px; width: 170px;
      vertical-align: middle;
      border-right: 1px solid var(--border);
    }
    .nm { font-size: 12px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .nm-badges { display: flex; gap: 3px; margin-top: 2px; flex-wrap: wrap; }
    .bsm { font-size: 9px; padding: 1px 5px; border-radius: 6px; font-weight: 700; }
    .bsm.wind  { background: #06b6d420; color: #67e8f9; }
    .bsm.rain  { background: #3b82f620; color: #93c5fd; }
    .bsm.snow  { background: #e0e7ff20; color: #c7d2fe; }
    .bsm.heat  { background: #ef444420; color: #fca5a5; }
    .bsm.cold  { background: #818cf820; color: #a5b4fc; }
    .bsm.storm { background: #8b5cf620; color: #c4b5fd; }

    /* Day cell */
    td.td-day {
      text-align: center; vertical-align: middle;
      padding: 5px 3px;
      border-left: 1px solid var(--border);
      background: var(--surface);
    }
    td.td-day.today { background: #252a48; }
    td.td-day.has-wind-alert { background: #2a1f1f; }

    .cell { display: flex; flex-direction: column; align-items: center; gap: 1px; }
    .c-ico { font-size: 20px; line-height: 1.1; }
    .c-temps { display: flex; gap: 4px; align-items: baseline; }
    .c-hi { font-size: 12px; font-weight: 700; color: var(--amber); font-variant-numeric: tabular-nums; }
    .c-hi.t-extreme { color: #ef4444; }
    .c-hi.t-hot     { color: #f97316; }
    .c-hi.t-warm    { color: var(--amber); }
    .c-hi.t-cool    { color: #60a5fa; }
    .c-lo { font-size: 10px; color: var(--muted); font-variant-numeric: tabular-nums; }
    .c-wind { font-size: 11px; font-weight: 700; font-variant-numeric: tabular-nums; display: flex; align-items: center; gap: 2px; line-height: 1; }
    .c-wind .wi { font-size: 10px; opacity: .7; }
    .c-wind.w-calm     { color: #374151; }
    .c-wind.w-light    { color: var(--muted); }
    .c-wind.w-notable  { color: #f59e0b; }
    .c-wind.w-strong   { color: #f97316; }
    .c-wind.w-extreme  { color: #ef4444; }
    .c-rain { font-size: 9px; color: #60a5fa; font-variant-numeric: tabular-nums; }
    .c-nodata { font-size: 10px; color: #2d3148; }

    /* ── Cards layout ── */
    .cards-outer { padding: 20px 0 60px; }
    .cards-list  { padding: 0 32px; display: flex; flex-direction: column; gap: 14px; }

    .dest-card {
      background: #fff;
      border: 1.5px solid var(--border);
      border-radius: 16px; overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,.05);
      transition: box-shadow .15s, border-color .15s;
    }
    .dest-card:hover     { border-color: #a5b4fc; box-shadow: 0 4px 16px rgba(99,102,241,.1); }
    .dest-card.has-alerts { border-color: #fca5a5; }

    /* Card header */
    .card-top {
      display: flex; justify-content: space-between; align-items: flex-start;
      padding: 16px 20px 14px; border-bottom: 1px solid var(--border); gap: 16px;
    }
    .card-dest-name { font-size: 20px; font-weight: 800; color: var(--text); line-height: 1.2; }
    .card-region    { font-size: 11px; color: #aab0cc; margin-top: 4px; }
    .card-peak      { font-size: 30px; font-weight: 900; line-height: 1; text-align: right; flex-shrink: 0; }
    .card-peak.pk-extreme { color: #b91c1c; }
    .card-peak.pk-high    { color: #dc2626; }
    .card-peak.pk-warn    { color: #ea580c; }
    .card-peak.pk-mild    { color: #d97706; }
    .card-peak.pk-low     { color: #9ca3af; }
    .card-peak-sub  { font-size: 11px; color: #aab0cc; text-align: right; margin-top: 4px; font-weight: 600; }

    /* Alert bar inside card */
    .card-alert-bar {
      padding: 6px 20px; background: #fff8f8; border-bottom: 1px solid #fecaca;
      display: flex; gap: 6px; flex-wrap: wrap; align-items: center;
    }
    .cab-lbl { font-size: 11px; font-weight: 800; color: #dc2626; white-space: nowrap; margin-right: 2px; }
    .atag {
      display: inline-flex; align-items: center; gap: 3px; padding: 2px 10px;
      border-radius: 20px; font-size: 10px; font-weight: 700; border: 1px solid;
    }
    .atag.wa { background: #e0f7ff; border-color: #7dd3fc; color: #0284c7; }
    .atag.ha { background: #fff1f1; border-color: #fca5a5; color: #dc2626; }
    .atag.ra { background: #eff6ff; border-color: #93c5fd; color: #1d4ed8; }
    .atag.ca { background: #f0f9ff; border-color: #67e8f9; color: #0369a1; }

    /* Day pills */
    .card-days { display: flex; }
    .day-pill {
      flex: 1; min-width: 68px;
      padding: 10px 4px 14px; text-align: center;
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column; align-items: center; gap: 2px;
      background: #fff;
    }
    .day-pill:last-child { border-right: none; }

    .day-pill.dp-today  { background: #f3f4ff; }
    .day-pill.sev-1     { background: #fffbeb; }
    .day-pill.sev-2     { background: #fef3c7; }
    .day-pill.sev-3     { background: #fee2e2; }
    .day-pill.sev-4     { background: #fecaca; }
    .day-pill.dp-today.sev-1 { background: #f5f3ff; }
    .day-pill.dp-today.sev-2 { background: #fdecc0; }
    .day-pill.dp-today.sev-3 { background: #ffd5d5; }
    .day-pill.dp-today.sev-4 { background: #ffbcbc; }

    .dp-day  { font-size: 10px; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
    .dp-date { font-size: 9px; color: #c8cde8; margin-bottom: 1px; }
    .dp-ico  { font-size: 22px; line-height: 1; margin: 3px 0; }
    .dp-hi   { font-size: 16px; font-weight: 800; color: var(--text); font-variant-numeric: tabular-nums; }
    .dp-hi.t-extreme { color: #dc2626; }
    .dp-hi.t-hot     { color: #ea580c; }
    .dp-hi.t-warm    { color: #d97706; }
    .dp-hi.t-cool    { color: #2563eb; }
    .dp-lo   { font-size: 11px; color: #9ca3af; font-variant-numeric: tabular-nums; }
    .dp-wind {
      display: flex; align-items: center; gap: 2px; margin-top: 3px;
      font-size: 11px; font-weight: 700; font-variant-numeric: tabular-nums;
    }
    .dp-wind .wi   { font-size: 9px; opacity: .7; }
    .dp-wind.w-none { color: #d1d5db; }
    .dp-wind.w-calm { color: #9ca3af; }
    .dp-wind.w-l1   { color: #4b5563; }
    .dp-wind.w-l2   { color: #d97706; }
    .dp-wind.w-l3   { color: #ea580c; }
    .dp-wind.w-l4   { color: #dc2626; }
    .dp-rain { font-size: 9px; color: #3b82f6; margin-top: 1px; }
    .dp-wind-val {
      display: flex; align-items: center; gap: 3px; margin-top: 3px;
      font-size: 16px; font-weight: 800; font-variant-numeric: tabular-nums;
    }
    .dp-wind-val .wi { font-size: 11px; opacity: .7; }
    .dp-wind-val.w-none { color: #d1d5db; }
    .dp-wind-val.w-calm { color: #9ca3af; }
    .dp-wind-val.w-l1   { color: #4b5563; }
    .dp-wind-val.w-l2   { color: #d97706; }
    .dp-wind-val.w-l3   { color: #ea580c; }
    .dp-wind-val.w-l4   { color: #dc2626; }
    .dp-unit { font-size: 9px; color: #9ca3af; margin-top: 1px; }

    /* ── Mode bar ── */
    .mode-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 32px; border-bottom: 1px solid var(--border);
      background: var(--surface2);
    }
    .mode-toggle { display: flex; border: 2px solid var(--accent); border-radius: 12px; overflow: hidden; }
    .mode-btn {
      padding: 10px 36px; font-size: 15px; font-weight: 700;
      background: transparent; border: none; color: var(--accent); cursor: pointer; transition: all .15s;
    }
    .mode-btn.active { background: var(--accent); color: #fff; }
    .mode-btn:hover:not(.active) { background: #eff0ff; }
    .mode-sub { font-size: 11px; color: var(--muted); margin-top: 8px; }

    /* ── Resumen mode ── */
    .summary-wrap { padding: 16px 32px 24px; }
    .sum-table { width: 100%; border-collapse: collapse; }
    .sum-table .sum-thead th {
      font-size: 10px; font-weight: 800; letter-spacing: .1em; text-transform: uppercase;
      color: var(--muted); padding: 0 8px 10px 0; text-align: left;
      border-bottom: 1px solid var(--border);
    }
    .sum-table .sum-thead th:first-child { width: 200px; padding-left: 0; }
    .sum-table .sum-thead .th-dates {
      display: block; font-size: 10px; font-weight: 500; letter-spacing: 0;
      text-transform: none; color: #4b5284; margin-top: 2px;
    }
    .sum-tr td { vertical-align: top; border-bottom: 1px solid rgba(46,49,73,.4); }
    .sum-tr:last-child td { border-bottom: none; }
    .sum-tr td:first-child {
      font-size: 13px; font-weight: 700; color: var(--text); vertical-align: middle;
      padding: 10px 14px 10px 0; white-space: nowrap;
    }
    .sum-cell-wrap { padding: 6px 8px 6px 0; }
    .sum-cell {
      padding: 8px 12px 8px 13px; border-radius: 8px; font-size: 13px; font-weight: 700;
      line-height: 1.65; display: flex; flex-direction: column; gap: 0;
      border-left: 3px solid;
    }
    /* Nivel 4: viento fuerte — rojo */
    .sc-4 { background: #fee2e2; border-left-color: #ef4444; color: #7f1d1d; }
    /* Nivel 3: calor fuerte — naranja */
    .sc-3 { background: #ffedd5; border-left-color: #f97316; color: #7c2d12; }
    /* Nivel 2: moderado — ámbar */
    .sc-2 { background: #fef9c3; border-left-color: #eab308; color: #713f12; }
    /* Nivel 1: lluvia — azul */
    .sc-1 { background: #dbeafe; border-left-color: #3b82f6; color: #1e3a8a; }
    /* Nivel 0: sin alertas — verde claro */
    .sc-0 { background: #dcfce7; border-left-color: #16a34a; color: #14532d; }
    .sum-cell-issue { display: block; font-size: 13px; }
    @media (max-width: 640px) {
      .summary-wrap { padding: 10px; }
      .sum-table .sum-thead th:first-child { width: 110px; }
      .sum-tr td:first-child { font-size: 11px; padding-right: 8px; }
      .sum-cell { padding: 7px 10px 7px 11px; font-size: 11px; }
    }
    .day-toggle {
      display: flex; gap: 3px; background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 3px;
    }
    .day-btn {
      padding: 6px 18px; font-size: 12px; font-weight: 700;
      background: transparent; border: none; color: var(--muted); border-radius: 6px;
      cursor: pointer; transition: all .15s;
    }
    .day-btn.active { background: var(--accent); color: #fff; }
    .day-btn:hover:not(.active) { color: var(--text); }

    /* ── Mobile responsive ── */
    @media (max-width: 640px) {
      header { padding: 10px 14px; }
      .header-title { font-size: 13px; }
      .header-meta { font-size: 10px; gap: 8px; }

      nav { padding: 0 6px; }
      .nav-link { padding: 10px 10px; font-size: 11px; }

      .mode-bar { padding: 12px 14px; flex-wrap: wrap; gap: 8px; }
      .mode-btn { padding: 8px 16px; font-size: 13px; }
      .day-toggle { margin-left: auto; }

      .cards-list { padding: 0 10px; gap: 10px; }

      .card-top { padding: 12px 14px 10px; gap: 10px; }
      .card-dest-name { font-size: 16px; }
      .card-peak { font-size: 24px; }
      .card-region { font-size: 10px; }

      .card-alert-bar { padding: 6px 14px; }

      .card-days { overflow-x: auto; -webkit-overflow-scrolling: touch; }
      .day-pill { min-width: 56px; padding: 8px 3px 10px; }
      .dp-ico  { font-size: 18px; }
      .dp-hi   { font-size: 14px; }
      .dp-wind-val { font-size: 14px; }
      .dp-lo   { font-size: 10px; }
      .dp-day  { font-size: 9px; }
      .dp-date { font-size: 8px; }

      .alert-strip { padding: 8px 14px; }
      .a-chip { font-size: 10px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-title">Kampaoh <span>·</span> Tiempo por Destinos</div>
  <div class="header-meta">
    <span id="updated-ts">—</span>
    <span style="opacity:.45">Open-Meteo</span>
  </div>
</header>

<nav id="main-nav">
  <a href="index.html" class="nav-link">Inversión Publicitaria</a>
  <a href="ga4.html" class="nav-link">Propiedades Vistas · GA4</a>
  <a href="busqueda-be.html" class="nav-link">Búsqueda BE</a>
  <a href="gsc.html" class="nav-link">GSC</a>
  <a href="funnel.html" class="nav-link">Funnel</a>
  <a href="tiempo.html" class="nav-link active">Tiempo</a>
</nav>
<script>if (new URLSearchParams(window.location.search).has('solo')) { document.getElementById('main-nav').style.display = 'none'; }</script>

<div class="mode-bar">
  <div>
    <div class="mode-toggle">
      <button class="mode-btn active" id="mode-summary" onclick="setMode('summary')">📋 Resumen</button>
      <button class="mode-btn" id="mode-wind" onclick="setMode('wind')">💨 Viento</button>
      <button class="mode-btn" id="mode-rain" onclick="setMode('rain')">🌧 Lluvia</button>
      <button class="mode-btn" id="mode-temp" onclick="setMode('temp')">🥶 Temperatura</button>
    </div>
    <div class="mode-sub" id="mode-sub">Prioridad: viento · lluvia · frío — peores destinos primero</div>
  </div>
  <div class="day-toggle">
    <button class="day-btn active" id="btn7" onclick="setDays(7)">7 días</button>
    <button class="day-btn" id="btn14" onclick="setDays(14)">14 días</button>
  </div>
</div>

<div id="alert-strip" style="display:none" class="alert-strip">
  <span class="alert-strip-title" id="alert-count"></span>
  <div id="alert-chips"></div>
</div>

<div class="cards-outer">
  <div id="loading" class="loading">
    <div class="spinner"></div>
    <div id="load-msg" style="font-size:13px;margin-bottom:4px">Conectando con Open-Meteo...</div>
    <div id="load-sub" style="font-size:11px;color:#4b5060">Cargando previsión para los ~85 destinos Kampaoh</div>
  </div>
  <div id="cards-wrap" style="display:none"></div>
</div>

<script>
// ─── Destinos (agrupados por zona, en orden geográfico) ──────────────────────
var GRUPOS = [
  { label: 'Cádiz · Huelva · Sevilla', country: 'es', dests: [
    {slug:'tarifa',             name:'Kampaoh Tarifa',                  lat:36.014, lon:-5.601},
    {slug:'paloma',             name:'Kampaoh Paloma',                   lat:36.025, lon:-5.620},
    {slug:'los-canos',          name:'Kampaoh Los Caños',                lat:36.213, lon:-6.043},
    {slug:'trafalgar',          name:'Kampaoh Trafalgar',                lat:36.183, lon:-6.033},
    {slug:'hostel-trafalgar',   name:'Kampaoh Hostel Trafalgar',         lat:36.183, lon:-6.033},

// ─── WMO icon ────────────────────────────────────────────────────────────────
function wmoIcon(code) {
  if (code == null) return '—';
  if (code === 0)   return '☀️';
  if (code <= 2)    return '🌤️';
  if (code === 3)   return '☁️';
  if (code <= 48)   return '🌫️';
  if (code <= 57)   return '🌦️';
  if (code <= 67)   return '🌧️';
  if (code <= 77)   return '❄️';
  if (code <= 82)   return '🌦️';
  if (code <= 86)   return '❄️';
  if (code <= 99)   return '⛈️';
  return '?';
}

// ─── Día label ───────────────────────────────────────────────────────────────
var DIAS_S = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
var MESES  = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
function dayLabel(dateStr, idx) {
  if (idx === 0) return 'Hoy';
  if (idx === 1) return 'Mañ';
  if (!dateStr) return '—';
  var d = new Date(dateStr + 'T12:00:00');
  return DIAS_S[d.getDay()];
}
function shortDate(dateStr) {
  if (!dateStr) return '';
  var d = new Date(dateStr + 'T12:00:00');
  return d.getDate() + ' ' + MESES[d.getMonth()];
}

// ─── Alertas ─────────────────────────────────────────────────────────────────
function getAlerts(dest, daily, nDays) {
  var a = [], n = Math.min(nDays, (daily.time||[]).length);
  for (var i = 0; i < n; i++) {
    var dl    = dayLabel((daily.time||[])[i]||'', i);
    var wind  = (daily.windspeed_10m_max||[])[i];
    var rain  = (daily.precipitation_sum||[])[i];
    var snow  = (daily.snowfall_sum||[])[i];
    var tmax  = (daily.temperature_2m_max||[])[i];
    var tmin  = (daily.temperature_2m_min||[])[i];
    var wcode = (daily.weathercode||[])[i];
    if (wind  != null && wind  >= 60) a.push({slug:dest.slug, name:dest.name, type:'wind',  day:i, dl:dl, val:Math.round(wind)+' km/h'});
    if (rain  != null && rain  >= 25) a.push({slug:dest.slug, name:dest.name, type:'rain',  day:i, dl:dl, val:Math.round(rain)+' mm'});
    if (snow  != null && snow  >=  1) a.push({slug:dest.slug, name:dest.name, type:'snow',  day:i, dl:dl, val:Math.round(snow)+' cm'});
    if (tmax  != null && tmax  >= 38) a.push({slug:dest.slug, name:dest.name, type:'heat',  day:i, dl:dl, val:Math.round(tmax)+'°'});
    if (tmin  != null && tmin  <=  0) a.push({slug:dest.slug, name:dest.name, type:'cold',  day:i, dl:dl, val:Math.round(tmin)+'°'});
    if (wcode != null && wcode >= 95) a.push({slug:dest.slug, name:dest.name, type:'storm', day:i, dl:dl, val:''});
  }
  return a;
}

// ─── API fetch ────────────────────────────────────────────────────────────────
var BATCH = 25;
async function fetchBatch(dests) {
  var url = 'https://api.open-meteo.com/v1/forecast'
    + '?latitude='  + dests.map(function(d){return d.lat;}).join(',')
    + '&longitude=' + dests.map(function(d){return d.lon;}).join(',')
    + '&daily=weathercode,temperature_2m_max,temperature_2m_min,'
    +         'precipitation_sum,precipitation_probability_max,'
    +         'windspeed_10m_max,snowfall_sum'
    + '&timezone=auto&forecast_days=14';
  var r = await fetch(url);
  if (!r.ok) throw new Error('HTTP '+r.status);
  var data = await r.json();
  return Array.isArray(data) ? data : [data];
}

async function loadAll() {
  var chunks = [];
  for (var i = 0; i < DESTINOS.length; i += BATCH) chunks.push(DESTINOS.slice(i, i + BATCH));
  var sets = await Promise.all(chunks.map(function(ch, ci) {
    document.getElementById('load-msg').textContent = 'Cargando bloque '+(ci+1)+'/'+chunks.length+'...';
    return fetchBatch(ch).catch(function(){ return ch.map(function(){return null;}); });
  }));
  var flat = sets.flat();
  DESTINOS.forEach(function(d, idx) {
    weatherData[d.slug] = flat[idx] ? (flat[idx].daily || null) : null;
  });
}

// ─── Clases de viento ────────────────────────────────────────────────────────
function windClass(v) {
  if (v == null || v < 15) return 'w-none';
  if (v < 20) return 'w-calm';
  if (v < 30) return 'w-l1';
  if (v < 45) return 'w-l2';
  if (v < 60) return 'w-l3';
  return 'w-l4';
}
function dayAlertLevel(wind, tmax) {
  var wl = 0, hl = 0;
  if (wind != null) {
    if (wind >= 60) wl = 4;
    else if (wind >= 45) wl = 3;
    else if (wind >= 30) wl = 2;
    else if (wind >= 20) wl = 1;
  }
  if (tmax != null) {
    if (tmax >= 40) hl = 4;
    else if (tmax >= 38) hl = 3;
    else if (tmax >= 35) hl = 2;
  }
  return { wl: wl, hl: hl, level: Math.max(wl, hl) };
}
function getCardAlerts(daily, nDays) {
  var alerts = [], n = Math.min(nDays, (daily.time||[]).length);
  for (var i = 0; i < n; i++) {
    var wind = (daily.windspeed_10m_max||[])[i];
    var tmin = (daily.temperature_2m_min||[])[i];
    var prob = (daily.precipitation_probability_max||[])[i];
    var rain = (daily.precipitation_sum||[])[i];
    var dt   = (daily.time||[])[i] || '';
    var lbl  = dayLabel(dt, i);
    if (wind != null && wind >= 25) {
      var wl = wind >= 45 ? 3 : wind >= 30 ? 2 : 1;
      alerts.push({ type:'wind', day:i, lbl:lbl, val:Math.round(wind)+' km/h', level:wl });
    }
    if (tmin != null && tmin < 14) {
      var cl = tmin < 8 ? 3 : 2;
      alerts.push({ type:'cold', day:i, lbl:lbl, val:Math.round(tmin)+'° mín', level:cl });
    }
    if ((prob != null && prob >= 40) || (rain != null && rain >= 2)) {
      var rl = (prob >= 70 || rain >= 5) ? 3 : 2;
      alerts.push({ type:'rain', day:i, lbl:lbl, val:(prob != null ? prob+'%' : rain.toFixed(1)+'mm'), level:rl });
    }
  }
  return alerts;
}
function tempClass(v) {

  if (v >= 38) return 't-extreme';
  if (v >= 33) return 't-hot';
  if (v >= 27) return 't-warm';

// ─── Helpers de modo ─────────────────────────────────────────────────────────
function getMaxMetric(daily, nDays, mode) {
  if (!daily) return null;
  var n = Math.min(nDays, (daily.time||[]).length);
  var result = null;
  var key = mode === 'wind' ? 'windspeed_10m_max'
          : mode === 'rain' ? 'precipitation_probability_max'
          : 'temperature_2m_min';
  for (var i = 0; i < n; i++) {
    var v = (daily[key]||[])[i];
    if (v != null) {
      if (mode === 'temp') { if (result === null || v < result) result = v; }
      else                 { if (result === null || v > result) result = v; }
    }
  }
  return result;
}
function setMode(m) {
  currentMode = m;
  ['summary','wind','rain','temp'].forEach(function(id) {
    document.getElementById('mode-' + id).classList.toggle('active', m === id);
  });
  document.getElementById('mode-sub').textContent = m === 'wind'
    ? 'Ordenados por viento máximo · de mayor a menor'
    : m === 'rain'
    ? 'Ordenados por probabilidad de lluvia · de mayor a menor'
    : m === 'temp'
    ? 'Ordenados por temperatura mínima · los más fríos primero'
    : 'Prioridad: viento · lluvia · frío — peores destinos primero';
  if (Object.keys(weatherData).length > 0) {
    if (m === 'summary') buildSummary();
    else buildTable();
  }
}

// ─── Análisis de período para modo Resumen ───────────────────────────────────
// Prioridad: viento fuerte > frío fuerte > lluvia > sol
// Niveles: 4=viento severo, 3=calor severo, 2=viento/calor moderado, 1=lluvia, 0=ok
function analyzePeriod(daily, startDay, numDays) {
  var total = (daily.time||[]).length;
  var n = Math.min(startDay + numDays, total);
  if (startDay >= total) return { level: -1, lines: [], cls: 'sc-0' };

  var maxWind = null, minTemp = null;
  var windStrongDays = 0, windModDays = 0;
  var coldStrongDays = 0, coldModDays = 0;
  var rainDays = 0;

  for (var i = startDay; i < n; i++) {
    var w = (daily.windspeed_10m_max||[])[i];
    var tm = (daily.temperature_2m_min||[])[i];
    var p = (daily.precipitation_probability_max||[])[i];
    var r = (daily.precipitation_sum||[])[i];
    if (w != null) {
      if (maxWind === null || w > maxWind) maxWind = w;
      if (w >= 45) windStrongDays++;
      else if (w >= 25) windModDays++;
    }
    if (tm != null) {
      if (minTemp === null || tm < minTemp) minTemp = tm;
      if (tm < 8) coldStrongDays++;
      else if (tm < 14) coldModDays++;
    }
    if ((p != null && p >= 60) || (r != null && r >= 3)) rainDays++;
  }

  var lines = [], level = 0;

  // 1. Viento (mayor prioridad)
  if (windStrongDays > 0) {
    lines.push('💨 Viento fuerte ' + windStrongDays + ' día' + (windStrongDays > 1 ? 's' : '') + ' (' + Math.round(maxWind) + ' km/h máx)');
    level = Math.max(level, 4);
  } else if (windModDays > 0) {
    lines.push('💨 Viento ' + windModDays + ' día' + (windModDays > 1 ? 's' : '') + ' (' + Math.round(maxWind) + ' km/h máx)');
    level = Math.max(level, 2);
  }

  // 2. Frío
  if (coldStrongDays > 0) {
    lines.push('🥶 Frío fuerte ' + coldStrongDays + ' día' + (coldStrongDays > 1 ? 's' : '') + ' (' + Math.round(minTemp) + '° mín)');
    level = Math.max(level, 3);
  } else if (coldModDays > 0) {
    lines.push('🥶 Frío ' + coldModDays + ' día' + (coldModDays > 1 ? 's' : '') + ' (' + Math.round(minTemp) + '° mín)');
    level = Math.max(level, 2);
  }

  // 3. Lluvia
  if (rainDays > 0) {
    lines.push('🌧 Llueve ' + rainDays + ' día' + (rainDays > 1 ? 's' : ''));
    if (level === 0) level = 1;
  }

  var cls = level >= 4 ? 'sc-4' : level === 3 ? 'sc-3' : level === 2 ? 'sc-2' : level === 1 ? 'sc-1' : 'sc-0';
  if (lines.length === 0) lines.push('☀️ Sin alertas');
  return { level: level, lines: lines, cls: cls };
}

// ─── Render modo Resumen ─────────────────────────────────────────────────────
function buildSummary() {
  var wrap = document.getElementById('cards-wrap');
  wrap.innerHTML = '';
  document.getElementById('alert-strip').style.display = 'none';

  // Rangos de fecha desde los datos del primer destino cargado
  var MONTHS = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  var firstSlug = Object.keys(weatherData)[0];
  var times = firstSlug ? (weatherData[firstSlug].time || []) : [];
  function fmtRange(s, e) {
    if (!times[s] || !times[e]) return '';
    var d1 = new Date(times[s] + 'T00:00:00'), d2 = new Date(times[e] + 'T00:00:00');
    var m1 = MONTHS[d1.getMonth()], m2 = MONTHS[d2.getMonth()];
    return d1.getDate() + (m1 !== m2 ? ' ' + m1 : '') + '–' + d2.getDate() + ' ' + m2;
  }
  var range1 = fmtRange(0, 6), range2 = fmtRange(7, 13);

  var rows = DESTINOS
    .filter(function(d) { return weatherData[d.slug]; })
    .map(function(d) {
      var daily = weatherData[d.slug];
      var w1 = analyzePeriod(daily, 0, 7);
      var w2 = analyzePeriod(daily, 7, 7);
      return { dest: d, w1: w1, w2: w2, topLevel: Math.max(w1.level, w2.level) };
    })
    .sort(function(a, b) { return b.topLevel - a.topLevel; });

  var html = '<div class="summary-wrap"><table class="sum-table">'
    + '<thead class="sum-thead"><tr>'
    + '<th>DESTINO</th>'
    + '<th>ESTA SEMANA' + (range1 ? '<span class="th-dates">' + range1 + '</span>' : '') + '</th>'
    + '<th>SEMANA QUE VIENE' + (range2 ? '<span class="th-dates">' + range2 + '</span>' : '') + '</th>'
    + '</tr></thead><tbody>';

  rows.forEach(function(r) {
    var name = r.dest.name.replace(/^Kampaoh\s+/, '');
    html += '<tr class="sum-tr">'
      + '<td>👉 ' + name + '</td>'
      + '<td class="sum-cell-wrap"><div class="sum-cell ' + r.w1.cls + '">'
      + r.w1.lines.map(function(l){ return '<span class="sum-cell-issue">' + l + '</span>'; }).join('')
      + '</div></td>'
      + '<td class="sum-cell-wrap"><div class="sum-cell ' + r.w2.cls + '">'
      + r.w2.lines.map(function(l){ return '<span class="sum-cell-issue">' + l + '</span>'; }).join('')
      + '</div></td>'
      + '</tr>';
  });

  html += '</tbody></table></div>';
  wrap.innerHTML = html;
  wrap.style.display = 'block';
}

// ─── Render cards ────────────────────────────────────────────────────────────
function buildTable() {
  var wrap = document.getElementById('cards-wrap');
  wrap.innerHTML = '';
  document.getElementById('alert-strip').style.display = 'none';

  var sampleDaily = null;
  for (var si = 0; si < DESTINOS.length; si++) {
    if (weatherData[DESTINOS[si].slug]) { sampleDaily = weatherData[DESTINOS[si].slug]; break; }
  }
  var days = Math.min(currentDays, sampleDaily ? (sampleDaily.time||[]).length : 7);
  var peakKey = currentMode === 'wind' ? 'windspeed_10m_max'
              : currentMode === 'rain' ? 'precipitation_probability_max'
              : 'temperature_2m_min';

  var sorted = DESTINOS.slice()
    .filter(function(d) { return weatherData[d.slug]; })
    .sort(function(a, b) {
      var va = getMaxMetric(weatherData[a.slug], days, currentMode);
      var vb = getMaxMetric(weatherData[b.slug], days, currentMode);
      if (currentMode === 'temp') return (va !== null ? va : 999) - (vb !== null ? vb : 999);
      return (vb || 0) - (va || 0);
    });

  var listDiv = document.createElement('div');
  listDiv.className = 'cards-list';

  sorted.forEach(function(dest) {
    var daily = weatherData[dest.slug];
    var n = Math.min(days, (daily.time||[]).length);

    // Find peak value and the day it occurs
    var rawPeak = null, peakIdx = -1;
    for (var pi = 0; pi < n; pi++) {
      var pv = (daily[peakKey]||[])[pi];
      if (pv != null) {
        if (currentMode === 'temp') {
          if (rawPeak === null || pv < rawPeak) { rawPeak = pv; peakIdx = pi; }
        } else {
          if (rawPeak === null || pv > rawPeak) { rawPeak = pv; peakIdx = pi; }
        }
      }
    }
    var peakVal    = rawPeak !== null ? Math.round(rawPeak) : null;
    var peakDt     = peakIdx >= 0 ? ((daily.time||[])[peakIdx] || '') : '';
    var peakDayLbl = peakIdx >= 0 ? dayLabel(peakDt, peakIdx) : '';

    // Badge color
    var pkCls = 'pk-low';
    if (currentMode === 'temp') {
      if (peakVal <= 0)  pkCls = 'pk-extreme';
      else if (peakVal <= 5)  pkCls = 'pk-high';
      else if (peakVal <= 10) pkCls = 'pk-warn';
      else if (peakVal <= 15) pkCls = 'pk-mild';
    } else if (currentMode === 'rain') {
      if (peakVal >= 80) pkCls = 'pk-extreme';
      else if (peakVal >= 60) pkCls = 'pk-high';
      else if (peakVal >= 40) pkCls = 'pk-warn';
      else if (peakVal >= 20) pkCls = 'pk-mild';
    } else {
      if (peakVal >= 60) pkCls = 'pk-extreme';
      else if (peakVal >= 45) pkCls = 'pk-high';
      else if (peakVal >= 30) pkCls = 'pk-warn';
      else if (peakVal >= 20) pkCls = 'pk-mild';
    }

    var peakStr = peakVal !== null
      ? (currentMode === 'rain' ? peakVal + '%'
       : currentMode === 'temp' ? peakVal + '° mín'
       : peakVal + ' km/h')
      : '—';

    var cardAlerts = getCardAlerts(daily, days);
    var card = document.createElement('div');
    card.className = 'dest-card' + (cardAlerts.length > 0 ? ' has-alerts' : '');

    // Card header: name + region (left), peak badge (right)
    var top = document.createElement('div');
    top.className = 'card-top';
    top.innerHTML = '<div>'
      + '<div class="card-dest-name">' + dest.name + '</div>'
      + '<div class="card-region">' + dest.group + '</div>'
      + '</div>'
      + '<div style="text-align:right">'
      + '<div class="card-peak ' + pkCls + '">' + peakStr + '</div>'
      + (peakDayLbl ? '<div class="card-peak-sub">' + peakDayLbl + '</div>' : '')
      + '</div>';
    card.appendChild(top);

    // Alert bar filtered by mode
    var modeAlerts = cardAlerts.filter(function(a) {
      return currentMode === 'wind' ? a.type === 'wind'
           : currentMode === 'rain' ? a.type === 'rain'
           : a.type === 'cold';
    });
    if (modeAlerts.length > 0) {
      var aBar = document.createElement('div');
      aBar.className = 'card-alert-bar';
      aBar.innerHTML = '<span class="cab-lbl">⚠</span>'
        + modeAlerts.map(function(a) {
            var ico = a.type === 'wind' ? '💨' : a.type === 'rain' ? '🌧' : '🥶';
            var cls = a.type === 'wind' ? 'wa' : a.type === 'rain' ? 'ra' : 'ca';
            return ' <span class="atag ' + cls + '">' + ico + ' ' + a.lbl + ' · ' + a.val + '</span>';
          }).join('');
      card.appendChild(aBar);
    }

    // Day pills
    var dRow = document.createElement('div');
    dRow.className = 'card-days';

    for (var i = 0; i < days; i++) {
      var code = (daily.weathercode||[])[i];
      var tmax = (daily.temperature_2m_max||[])[i];
      var tmin = (daily.temperature_2m_min||[])[i];
      var wind = (daily.windspeed_10m_max||[])[i];
      var prob = (daily.precipitation_probability_max||[])[i];
      var dt   = (daily.time||[])[i] || '';
      var rainMm = (daily.precipitation_sum||[])[i];
      var al   = dayAlertLevel(wind, tmax);
      var sevLevel = currentMode === 'wind' ? al.wl
                   : currentMode === 'rain' ? (prob >= 70 ? 3 : prob >= 40 ? 2 : prob >= 20 ? 1 : 0)
                   : (tmin != null && tmin < 8 ? 3 : tmin != null && tmin < 14 ? 2 : 0);

      var pill = document.createElement('div');
      pill.className = 'day-pill'
        + (i === 0 ? ' dp-today' : '')
        + (sevLevel > 0 ? ' sev-' + sevLevel : '');

      var pillContent = '<div class="dp-day">' + dayLabel(dt, i) + '</div>'
        + '<div class="dp-date">' + shortDate(dt) + '</div>';

      if (currentMode === 'wind') {
        pillContent += wind != null
          ? '<div class="dp-wind-val ' + windClass(wind) + '">' + Math.round(wind) + '</div>'
            + '<div class="dp-unit">km/h</div>'
          : '<div class="dp-wind-val w-none">—</div>';
        pillContent += (prob != null && prob >= 20 ? '<div class="dp-rain">' + prob + '%</div>' : '');
      } else if (currentMode === 'rain') {
        pillContent += '<div class="dp-ico">' + wmoIcon(code) + '</div>'
          + '<div class="dp-wind-val ' + (prob >= 70 ? 'w-danger' : prob >= 40 ? 'w-warn' : prob >= 20 ? 'w-mod' : 'w-none') + '">'
          + (prob != null ? prob + '%' : '—') + '</div>'
          + (rainMm != null && rainMm > 0 ? '<div class="dp-unit">' + rainMm.toFixed(1) + 'mm</div>' : '<div class="dp-unit"> </div>');
      } else {
        pillContent += '<div class="dp-ico">' + wmoIcon(code) + '</div>'
          + '<div class="dp-lo ' + (tmin != null && tmin < 8 ? 't-extreme' : tmin != null && tmin < 14 ? 't-cool' : '') + '">'
          + (tmin != null ? Math.round(tmin) + '° mín' : '—') + '</div>'
          + '<div class="dp-hi">' + (tmax != null ? Math.round(tmax) + '°' : '') + '</div>';
      }
      pill.innerHTML = pillContent;

      dRow.appendChild(pill);
    }
    card.appendChild(dRow);
    listDiv.appendChild(card);
  });

  wrap.appendChild(listDiv);
  document.getElementById('cards-wrap').style.display = '';
  document.getElementById('updated-ts').textContent =
    'Actualizado ' + new Date().toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit'});
}

function renderAlertStrip(allAlerts) {
  var strip = document.getElementById('alert-strip');
  var chips = document.getElementById('alert-chips');
  if (allAlerts.length === 0) { strip.style.display = 'none'; return; }
  strip.style.display = 'flex';
  document.getElementById('alert-count').textContent =
    '⚠ ' + allAlerts.length + ' alerta' + (allAlerts.length > 1 ? 's' : '') + ' · 7 días —';

  var seen = new Set();
  var unique = allAlerts.filter(function(a) {
    var k = a.slug+'|'+a.type+'|'+a.day;
    if (seen.has(k)) return false; seen.add(k); return true;
  });
  var ord = {storm:0,heat:1,cold:2,wind:3,rain:4,snow:5};
  unique.sort(function(a,b){ return a.day - b.day || (ord[a.type]||9)-(ord[b.type]||9); });
  var emo = {wind:'💨',rain:'🌧️',snow:'❄️',heat:'🌡️',cold:'🥶',storm:'⛈️'};
  chips.innerHTML = unique.slice(0,30).map(function(a){
    return '<span class="a-chip '+a.type+'">'
      +emo[a.type]+' <span class="dest">'+a.name+'</span>'
      +' <span class="info">'+a.dl+(a.val?' · '+a.val:'')+'</span>'
      +'</span>';
  }).join('');
}

// ─── Controles ────────────────────────────────────────────────────────────────
function setDays(n) {
  currentDays = n;
  document.getElementById('btn7').classList.toggle('active', n===7);
  document.getElementById('btn14').classList.toggle('active', n===14);
  if (Object.keys(weatherData).length > 0) { if (currentMode === 'summary') buildSummary(); else buildTable(); }
}
function setFilter(f) {
  currentFilter = f;
  ['all','alert','es','pt'].forEach(function(id){
    document.getElementById('f-'+id).classList.toggle('active', id===f);
  });
  if (Object.keys(weatherData).length > 0) { if (currentMode === 'summary') buildSummary(); else buildTable(); }
}
function setTempFilter(v) {
  currentTempMin = v;
  [0,25,30,35,38].forEach(function(x){
    document.getElementById('t-'+x).classList.toggle('active', x===v);
  });
  if (Object.keys(weatherData).length > 0) { if (currentMode === 'summary') buildSummary(); else buildTable(); }
}
function setWindFilter(v) {
  currentWindMin = v;
  [0,25,40,55,70].forEach(function(x){
    document.getElementById('w-'+x).classList.toggle('active', x===v);
  });
  if (Object.keys(weatherData).length > 0) { if (currentMode === 'summary') buildSummary(); else buildTable(); }
}

// ─── Init ────────────────────────────────────────────────────────────────────
(async function() {
  try {
    await loadAll();
    document.getElementById('loading').style.display = 'none';
    if (currentMode === 'summary') buildSummary(); else buildTable();
  } catch(e) {
    document.getElementById('load-msg').textContent = 'Error al cargar los datos';
    document.getElementById('load-sub').textContent = e.message || 'Inténtalo de nuevo';
  }
})();
</script>
