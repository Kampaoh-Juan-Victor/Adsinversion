<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kampaoh · Por objetivo</title>
<style>
  :root {
    --bg:#0f1117; --surface:#1a1d27; --surface2:#222536; --border:#2e3149;
    --text:#e8eaf0; --muted:#7b7f9e; --meta:#1877f2; --tiktok:#ff0050;
    --google:#fbbc04; --danger:#ef4444; --accent:#6366f1; --green:#22c55e;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;}

  header{background:var(--surface);border-bottom:1px solid var(--border);padding:18px 32px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
  header h1{font-size:18px;font-weight:700;}
  header h1 span{color:var(--accent);}
  .meta-info{color:var(--muted);font-size:12px;}
  .meta-info strong{color:var(--text);}

  nav{background:#222536;border-bottom:1px solid #2e3149;padding:0 32px;display:flex;gap:0;}
  .nav-a{padding:10px 18px;font-size:12px;font-weight:600;color:#7b7f9e;text-decoration:none;border-bottom:2px solid transparent;white-space:nowrap;}
  .nav-a.active{color:var(--accent);border-bottom-color:var(--accent);}

  /* ── Period bar ── */
  .period-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 32px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .pb-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-right:4px;}
  .period-btn{padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;}
  .period-btn:hover{border-color:var(--accent);color:var(--text);}
  .period-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
  .pb-sep{color:var(--border);font-size:12px;}
  input[type=date]{background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;padding:4px 8px;cursor:pointer;}
  input[type=date]:focus{outline:none;border-color:var(--accent);}
  .btn-apply{padding:5px 14px;border-radius:6px;border:1px solid var(--accent);background:transparent;color:var(--accent);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;}
  .btn-apply:hover{background:var(--accent);color:#fff;}

  main{padding:24px 32px 32px;max-width:1400px;margin:0 auto;}

  /* ── KPI cards ── */
  .kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
  .kpi{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px 20px;}
  .kpi .label{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.7px;margin-bottom:7px;}
  .kpi .value{font-size:26px;font-weight:700;letter-spacing:-.5px;}
  .kpi .sub{color:var(--muted);font-size:11px;margin-top:3px;}

  /* ── Table card ── */
  .table-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:24px;}
  .table-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
  .table-header h2{font-size:13px;font-weight:700;}
  .period-label{font-size:11px;color:var(--muted);}

  .obj-tabs-row{padding:12px 20px;border-bottom:1px solid var(--border);display:flex;gap:6px;flex-wrap:wrap;}
  .obj-tab{padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;}
  .obj-tab:hover{border-color:var(--accent);color:var(--text);}
  .obj-tab.active{background:var(--accent);border-color:var(--accent);color:#fff;}

  .plat-head{padding:10px 20px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;color:var(--muted);background:var(--surface2);}
  .plat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .no-camp{padding:16px 20px;color:var(--muted);font-size:12px;font-style:italic;}

  table{width:100%;border-collapse:collapse;}
  th{padding:9px 14px;text-align:right;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;background:var(--surface2);border-bottom:1px solid var(--border);white-space:nowrap;}
  th:first-child{text-align:left;}
  td{padding:10px 14px;text-align:right;border-bottom:1px solid rgba(255,255,255,.04);font-variant-numeric:tabular-nums;font-size:12px;}
  td:first-child{text-align:left;max-width:380px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  tr:last-child td{border-bottom:none;}
  tr:hover td{background:rgba(255,255,255,.025);}
  .dash{color:var(--border);}
  .tag-type{display:inline-block;border-radius:4px;padding:1px 7px;font-size:10px;font-weight:700;text-transform:uppercase;}
  .tag-s{background:rgba(251,188,4,.12);color:var(--google);}
  .tag-p{background:rgba(99,102,241,.12);color:#a5b4fc;}
  .tag-d{background:rgba(56,189,248,.12);color:#38bdf8;}
  .tag-v{background:rgba(239,68,68,.12);color:#f87171;}
  .roas-good{color:var(--green);font-weight:700;}
  .roas-ok{color:#fbbf24;font-weight:700;}
  .roas-bad{color:var(--danger);font-weight:700;}

  .loading-msg{padding:40px;text-align:center;color:var(--muted);font-size:13px;}

  footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;border-top:1px solid var(--border);margin-top:8px;}
  @media(max-width:900px){.kpi-row{grid-template-columns:repeat(2,1fr);}main{padding:16px;}}
</style>
</head>
<body>

<header>
  <h1>Kampaoh &middot; <span>Por objetivo</span></h1>
  <div class="meta-info">Período: <strong id="hdr-period">—</strong> &nbsp;&middot;&nbsp; Actualizado: <strong id="hdr-updated">—</strong></div>
</header>

<nav>
  <a href="index.html" class="nav-a">Inversión Publicitaria</a>
  <a href="ga4.html" class="nav-a">Propiedades Vistas · GA4</a>
  <a href="busqueda-be.html" class="nav-a">Búsqueda BE</a>
  <a href="gsc.html" class="nav-a">GSC</a>
  <a href="funnel.html" class="nav-a">Funnel</a>
</nav>

<div class="period-bar">
  <span class="pb-label">Período</span>
  <button class="period-btn" id="btn-7">Últ. 7 días</button>
  <button class="period-btn active" id="btn-30">Últ. 30 días</button>
  <button class="period-btn" id="btn-mes">Este mes</button>
  <button class="period-btn" id="btn-ant">Mes anterior</button>
  <span class="pb-sep">|</span>
  <input type="date" id="date-from">
  <span style="color:var(--muted);font-size:12px">→</span>
  <input type="date" id="date-to">
  <button class="btn-apply" id="btn-apply">Aplicar</button>
</div>

<main>

  <div class="kpi-row">
    <div class="kpi">
      <div class="label">Conversiones</div>
      <div class="value" id="kpi-conv" style="color:var(--green)">—</div>
      <div class="sub" id="kpi-conv-sub"></div>
    </div>
    <div class="kpi">
      <div class="label">Tráfico</div>
      <div class="value" id="kpi-traf" style="color:var(--accent)">—</div>
      <div class="sub" id="kpi-traf-sub"></div>
    </div>
    <div class="kpi">
      <div class="label">Alcance</div>
      <div class="value" id="kpi-alc" style="color:#a78bfa">—</div>
      <div class="sub" id="kpi-alc-sub"></div>
    </div>
    <div class="kpi">
      <div class="label">Interacción</div>
      <div class="value" id="kpi-int" style="color:var(--muted)">—</div>
      <div class="sub" id="kpi-int-sub"></div>
    </div>
  </div>

  <div class="table-card">
    <div class="table-header">
      <h2>Campañas por objetivo</h2>
      <span class="period-label" id="tbl-period"></span>
    </div>
    <div class="obj-tabs-row">
      <button class="obj-tab active" data-obj="conv">Conversiones</button>
      <button class="obj-tab" data-obj="traf">Tráfico</button>
      <button class="obj-tab" data-obj="alc">Alcance</button>
      <button class="obj-tab" data-obj="int">Interacción</button>
    </div>
    <div id="obj-content"><div class="loading-msg">Cargando datos…</div></div>
  </div>

</main>

<footer>Kampaoh &middot; Datos Porter &middot; <a href="https://app.portermetrics.com" target="_blank" style="color:var(--accent)">Abrir Portermetrics</a></footer>

<script>
var DATA = null;
var fromDate = "", toDate = "";
var activePreset = "last_30_days";
var activeObj = "conv";

var MONTHS_ES = ["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];

function daysAgo(n){ var d=new Date(); d.setDate(d.getDate()-n); return d.toISOString().slice(0,10); }
function firstOfMonth(off){ var d=new Date(); d.setDate(1); if(off) d.setMonth(d.getMonth()+off); return d.toISOString().slice(0,10); }
function lastOfLastMonth(){ var d=new Date(); d.setDate(0); return d.toISOString().slice(0,10); }
function formatPeriod(from,to){
  var f=new Date(from+"T00:00:00Z"), t=new Date(to+"T00:00:00Z");
  var fs=f.getUTCDate()+" "+MONTHS_ES[f.getUTCMonth()];
  if(f.getUTCFullYear()!==t.getUTCFullYear()) fs+=" "+f.getUTCFullYear();
  return fs+" – "+t.getUTCDate()+" "+MONTHS_ES[t.getUTCMonth()]+" "+t.getUTCFullYear();
}

var PRESET_RANGES = {
  last_7_days:  function(){ return {from:daysAgo(7),  to:daysAgo(1)}; },
  last_30_days: function(){ return {from:daysAgo(30), to:daysAgo(1)}; },
  this_month:   function(){ return {from:firstOfMonth(0), to:daysAgo(1)}; },
  last_month:   function(){ return {from:firstOfMonth(-1), to:lastOfLastMonth()}; },
};

function normalize(s){
  return s.toLowerCase()
    .replace(/[áàâä]/g,'a').replace(/[éèêë]/g,'e')
    .replace(/[íìîï]/g,'i').replace(/[óòôö]/g,'o')
    .replace(/[úùûü]/g,'u').replace(/ñ/g,'n').replace(/ç/g,'c');
}

function getObjective(name){
  var n = normalize(name);
  if (n.includes('conversiones')) return 'conv';
  if (n.includes('trafico'))      return 'traf';
  if (n.includes('alcance'))      return 'alc';
  if (n.includes('engagement') || n.includes('interaccion')) return 'int';
  return 'otro';
}

function getCampType(name){
  var n = normalize(name);
  if (n.includes('pmax') || n.includes('performance max')) return 'p';
  if (n.includes('search')) return 's';
  if (n.includes('gendemand') || n.includes('demand gen')) return 'd';
  if (n.includes('video') || n.includes('vídeo') || n.includes('alcance')) return 'v';
  return 's';
}
var TYPE_LABEL = {s:'Search', p:'PMax', d:'Demand Gen', v:'Vídeo'};

function aggregate(from, to){
  if (!DATA) return {meta:{}, google:{}};
  var meta = {}, google = {};
  Object.keys(DATA.days).forEach(function(dt){
    if (dt < from || dt > to) return;
    var day = DATA.days[dt];
    (day.m||[]).forEach(function(r){
      var n=r[0];
      if(!meta[n]) meta[n]={s:0,pu:0,cv:0,rch:0,lv:0,imp:0};
      meta[n].s+=r[1]||0; meta[n].pu+=r[2]||0; meta[n].cv+=r[3]||0;
      meta[n].rch+=r[4]||0; meta[n].lv+=r[5]||0; meta[n].imp+=r[6]||0;
    });
    (day.g||[]).forEach(function(r){
      var n=r[0];
      if(!google[n]) google[n]={s:0,cv:0,rv:0,imp:0,clk:0};
      google[n].s+=r[1]||0; google[n].cv+=r[2]||0; google[n].rv+=r[3]||0;
      google[n].imp+=r[4]||0; google[n].clk+=r[5]||0;
    });
  });
  return {meta:meta, google:google};
}

function fmt(v){ return "€"+Math.round(v).toLocaleString("es-ES"); }
function fmtD(v,d){ return "€"+(+v).toFixed(d||2); }
function fmtN(v){ return Math.round(v).toLocaleString("es-ES"); }
function dash(){ return "<span class='dash'>—</span>"; }

function buildTable(color, label, rows, cols){
  if (!rows || !rows.length) return "<div class='no-camp'>Sin campañas activas en este período</div>";
  var h="<table><thead><tr><th>Campaña</th>";
  cols.forEach(function(c){ h+="<th>"+c.l+"</th>"; });
  h+="</tr></thead><tbody>";
  rows.forEach(function(r){
    h+="<tr><td title='"+r.n+"'>"+r.n+"</td>";
    cols.forEach(function(c){ h+="<td>"+c.f(r)+"</td>"; });
    h+="</tr>";
  });
  return h+"</tbody></table>";
}

function buildGoogleTable(rows, cols){
  if (!rows || !rows.length) return "<div class='no-camp'>Sin campañas activas en este período</div>";
  var h="<table><thead><tr><th>Campaña</th><th>Tipo</th>";
  cols.forEach(function(c){ h+="<th>"+c.l+"</th>"; });
  h+="</tr></thead><tbody>";
  rows.forEach(function(r){
    var t=getCampType(r.n);
    h+="<tr><td title='"+r.n+"'>"+r.n+"</td><td><span class='tag-type tag-"+t+"'>"+TYPE_LABEL[t]+"</span></td>";
    cols.forEach(function(c){ h+="<td>"+c.f(r)+"</td>"; });
    h+="</tr>";
  });
  return h+"</tbody></table>";
}

function platSection(color, label, tableHtml){
  return "<div class='plat-head'><div class='plat-dot' style='background:"+color+"'></div>"+label+"</div>"+tableHtml;
}

function renderObjectives(){
  if (!DATA) return;
  var agg = aggregate(fromDate, toDate);

  // Classify campaigns by objective
  var byObj = {conv:{m:[],g:[]}, traf:{m:[],g:[]}, alc:{m:[],g:[]}, int:{m:[],g:[]}, otro:{m:[],g:[]}};
  Object.keys(agg.meta).forEach(function(n){
    var obj = getObjective(n);
    var d = agg.meta[n];
    d.n = n;
    byObj[obj].m.push(d);
  });
  Object.keys(agg.google).forEach(function(n){
    var obj = getObjective(n);
    var d = agg.google[n];
    d.n = n;
    byObj[obj].g.push(d);
  });
  // Sort by spend desc
  ['conv','traf','alc','int','otro'].forEach(function(obj){
    byObj[obj].m.sort(function(a,b){ return b.s-a.s; });
    byObj[obj].g.sort(function(a,b){ return b.s-a.s; });
  });

  // KPI cards
  function sumSpend(list){ return list.reduce(function(s,d){ return s+d.s; }, 0); }
  var spConv = sumSpend(byObj.conv.m) + sumSpend(byObj.conv.g);
  var spTraf = sumSpend(byObj.traf.m) + sumSpend(byObj.traf.g);
  var spAlc  = sumSpend(byObj.alc.m)  + sumSpend(byObj.alc.g);
  var spInt  = sumSpend(byObj.int.m)  + sumSpend(byObj.int.g);

  document.getElementById("kpi-conv").textContent = fmt(spConv);
  document.getElementById("kpi-traf").textContent = fmt(spTraf);
  document.getElementById("kpi-alc").textContent  = fmt(spAlc);
  document.getElementById("kpi-int").textContent  = fmt(spInt);

  // KPI subs: count active campaigns
  function countCamp(obj){ return (byObj[obj].m.filter(function(d){return d.s>0;}).length) + (byObj[obj].g.filter(function(d){return d.s>0;}).length); }
  document.getElementById("kpi-conv-sub").textContent = countCamp('conv')+" campañas · Meta + Google";
  document.getElementById("kpi-traf-sub").textContent = countCamp('traf')+" campañas";
  document.getElementById("kpi-alc-sub").textContent  = countCamp('alc')+" campañas · Meta + Google";
  document.getElementById("kpi-int-sub").textContent  = countCamp('int')+" campaña/s · Meta";

  // Period labels
  var periodStr = formatPeriod(fromDate, toDate);
  document.getElementById("hdr-period").textContent   = periodStr;
  document.getElementById("tbl-period").textContent   = periodStr;

  // Campaign tables by active objective
  var obj = activeObj;
  var html = "";

  if (obj === "conv") {
    var mCols = [
      {l:"Inversión",    f:function(r){ return fmt(r.s); }},
      {l:"Compras",      f:function(r){ return fmtN(r.pu); }},
      {l:"Conversiones", f:function(r){ return fmtN(r.cv); }},
      {l:"CPA",          f:function(r){ return r.cv>0 ? fmtD(r.s/r.cv) : dash(); }},
    ];
    var gCols = [
      {l:"Inversión",    f:function(r){ return fmt(r.s); }},
      {l:"Conversiones", f:function(r){ return fmtN(r.cv); }},
      {l:"CPA",          f:function(r){ return r.cv>0 ? fmtD(r.s/r.cv) : dash(); }},
      {l:"Valor conv.",  f:function(r){ return r.rv>0 ? fmt(r.rv) : dash(); }},
      {l:"ROAS",         f:function(r){
        if (!r.rv || !r.s) return dash();
        var roas = r.rv/r.s;
        var cls = roas>=10?"roas-good":(roas>=3?"roas-ok":"roas-bad");
        return "<span class='"+cls+"'>×"+roas.toFixed(0)+"</span>";
      }},
    ];
    html += platSection("#1877f2","Meta Ads", buildTable("#1877f2","Meta Ads", byObj.conv.m, mCols));
    html += platSection("#fbbc04","Google Ads", buildGoogleTable(byObj.conv.g, gCols));

  } else if (obj === "traf") {
    var mCols = [
      {l:"Inversión",    f:function(r){ return fmt(r.s); }},
      {l:"Visitas LP",   f:function(r){ return fmtN(r.lv); }},
      {l:"Coste/visita", f:function(r){ return r.lv>0 ? fmtD(r.s/r.lv,3) : dash(); }},
    ];
    var gCols = [
      {l:"Inversión",    f:function(r){ return fmt(r.s); }},
      {l:"Clics",        f:function(r){ return fmtN(r.clk); }},
      {l:"CPC",          f:function(r){ return r.clk>0 ? fmtD(r.s/r.clk,3) : dash(); }},
    ];
    html += platSection("#1877f2","Meta Ads", buildTable("#1877f2","Meta Ads", byObj.traf.m, mCols));
    html += platSection("#fbbc04","Google Ads", buildGoogleTable(byObj.traf.g, gCols));

  } else if (obj === "alc") {
    var mCols = [
      {l:"Inversión",          f:function(r){ return fmt(r.s); }},
      {l:"Personas alcanzadas",f:function(r){ return fmtN(r.rch); }},
      {l:"CPP (€/mil)",        f:function(r){ return r.rch>0 ? fmtD(r.s/r.rch*1000) : dash(); }},
    ];
    var gCols = [
      {l:"Inversión",    f:function(r){ return fmt(r.s); }},
      {l:"Impresiones",  f:function(r){ return fmtN(r.imp); }},
      {l:"CPM",          f:function(r){ return r.imp>0 ? fmtD(r.s/r.imp*1000) : dash(); }},
    ];
    html += platSection("#1877f2","Meta Ads", buildTable("#1877f2","Meta Ads", byObj.alc.m, mCols));
    html += platSection("#fbbc04","Google Ads", buildGoogleTable(byObj.alc.g, gCols));

  } else if (obj === "int") {
    var mCols = [
      {l:"Inversión",   f:function(r){ return fmt(r.s); }},
      {l:"Impresiones", f:function(r){ return fmtN(r.imp); }},
      {l:"Alcance",     f:function(r){ return fmtN(r.rch); }},
      {l:"CPM",         f:function(r){ return r.imp>0 ? fmtD(r.s/r.imp*1000) : dash(); }},
    ];
    html += platSection("#1877f2","Meta Ads", buildTable("#1877f2","Meta Ads", byObj.int.m, mCols));
    html += platSection("#fbbc04","Google Ads", "<div class='no-camp'>Sin campañas de interacción en Google Ads</div>");
  }

  document.getElementById("obj-content").innerHTML = html;
}

function setPreset(preset){
  activePreset = preset;
  var r = PRESET_RANGES[preset]();
  fromDate = r.from; toDate = r.to;
  document.getElementById("date-from").value = fromDate;
  document.getElementById("date-to").value   = toDate;
  ["btn-7","btn-30","btn-mes","btn-ant"].forEach(function(id){
    var b=document.getElementById(id);
    if(b){ var map={"btn-7":"last_7_days","btn-30":"last_30_days","btn-mes":"this_month","btn-ant":"last_month"};
      b.className="period-btn"+(map[id]===preset?" active":""); }
  });
  renderObjectives();
}

document.getElementById("btn-7").onclick   = function(){ setPreset("last_7_days"); };
document.getElementById("btn-30").onclick  = function(){ setPreset("last_30_days"); };
document.getElementById("btn-mes").onclick = function(){ setPreset("this_month"); };
document.getElementById("btn-ant").onclick = function(){ setPreset("last_month"); };

document.getElementById("btn-apply").onclick = function(){
  var from=document.getElementById("date-from").value, to=document.getElementById("date-to").value;
  if(!from||!to||from>to) return;
  fromDate=from; toDate=to; activePreset=null;
  ["btn-7","btn-30","btn-mes","btn-ant"].forEach(function(id){var b=document.getElementById(id);if(b)b.className="period-btn";});
  renderObjectives();
};

document.querySelectorAll(".obj-tab").forEach(function(btn){
  btn.onclick = function(){
    document.querySelectorAll(".obj-tab").forEach(function(b){ b.classList.remove("active"); });
    btn.classList.add("active");
    activeObj = btn.getAttribute("data-obj");
    renderObjectives();
  };
});

// Init
setPreset("last_30_days");
fetch("campaigns-data.json")
  .then(function(r){ return r.json(); })
  .then(function(d){
    DATA = d;
    document.getElementById("hdr-updated").textContent = d.updated || "—";
    if (activePreset) setPreset(activePreset); else renderObjectives();
  })
  .catch(function(e){ console.error("Error cargando campaigns-data.json:", e); });
</script>
</body>
</html>
