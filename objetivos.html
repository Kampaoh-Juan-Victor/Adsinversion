<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
  <meta name="robots" content="noindex, nofollow">
  <script>(function(){if(sessionStorage.getItem('kp')==='1')return;function _kpShow(){var o=document.createElement('div');o.id='kp-lock';o.style.cssText='position:fixed;inset:0;background:#0f1117;z-index:99999;display:flex;align-items:center;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,sans-serif';o.innerHTML='<div style="text-align:center"><div style="font-size:24px;font-weight:900;color:#fff;letter-spacing:-.5px;margin-bottom:6px">Kampaoh<\/div><div style="font-size:12px;color:#6870a0;margin-bottom:28px;letter-spacing:.06em;text-transform:uppercase">Dashboard &middot; Acceso privado<\/div><input id="kpi" type="password" placeholder="C\u00f3digo de acceso" style="width:200px;padding:12px 16px;border:2px solid #2a2d42;border-radius:10px;background:#1a1d2e;color:#fff;font-size:18px;text-align:center;outline:none;letter-spacing:.2em" autocomplete="current-password" \/><br><div id="kpe" style="height:18px;margin-top:8px;font-size:11px;color:#dc2626"><\/div><button id="kpb" style="margin-top:4px;padding:11px 36px;background:#6366f1;border:none;border-radius:9px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;width:200px">Entrar<\/button><\/div>';document.body.prepend(o);function go(){if(document.getElementById('kpi').value==='1806'){sessionStorage.setItem('kp','1');document.getElementById('kp-lock').remove();}else{document.getElementById('kpi').style.borderColor='#dc2626';document.getElementById('kpe').textContent='C\u00f3digo incorrecto';}}document.getElementById('kpb').onclick=go;document.getElementById('kpi').addEventListener('keydown',function(e){if(e.key==='Enter')go();document.getElementById('kpi').style.borderColor='#2a2d42';document.getElementById('kpe').textContent='';});document.getElementById('kpi').focus();}if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',_kpShow);}else{_kpShow();}})()</script>
</body>
</html>
