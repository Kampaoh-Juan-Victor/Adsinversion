  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script>
var FULL_DATA      = null;
var activeDays     = 7;
var customFrom     = null, customTo = null;
var sparkCharts    = [];
var EVENT_FIRST    = {}; // { eventKey: 'YYYY-MM-DD' }

var STEP_COLORS = [
  '#6366f1','#8b5cf6','#a855f7','#ec4899',
  '#f59e0b','#f97316','#ef4444','#10b981',
];

function n(v)   { return v == null ? '—' : v.toLocaleString('es'); }
function fmt(v) { return v >= 1e6 ? (v/1e6).toFixed(1)+'M' : v >= 1e3 ? (v/1e3).toFixed(1)+'k' : String(v); }

function isoAddDays(iso, nd) {
  var d = new Date(iso + 'T12:00:00Z');
  d.setUTCDate(d.getUTCDate() + nd);
  return d.toISOString().slice(0, 10);
}

function rateClass(r) {
  return r >= 50 ? 'rate-good' : r >= 15 ? 'rate-mid' : 'rate-bad';
}

function computeEventFirstDates() {
  var dates = Object.keys(FULL_DATA.byDate).sort();
  FULL_DATA.steps.forEach(function(s) {
    var first = dates.find(function(d) { return (FULL_DATA.byDate[d][s.key] || 0) > 0; });
    EVENT_FIRST[s.key] = first || null;
  });
}

// Fecha más tardía de todos los eventos — inicio fiable del funnel
function safeFromDate() {
  var firsts = FULL_DATA.steps.map(function(s) { return EVENT_FIRST[s.key]; }).filter(Boolean);
  return firsts.length ? firsts.reduce(function(a, b) { return a > b ? a : b; }) : FULL_DATA.dateFrom;
}

function getPeriodRange() {
  if (customFrom && customTo) return { from: customFrom, to: customTo };
  var dateTo   = FULL_DATA.dateTo;
  var dateFrom = isoAddDays(dateTo, -(activeDays - 1));
  // clamp to available data
  if (dateFrom < FULL_DATA.dateFrom) dateFrom = FULL_DATA.dateFrom;
  return { from: dateFrom, to: dateTo };
}

function computeTotals(from, to) {
  var totals = {};
  FULL_DATA.steps.forEach(function(s) { totals[s.key] = 0; });
  Object.entries(FULL_DATA.byDate).forEach(function(entry) {
    var date = entry[0], events = entry[1];
    if (date < from || date > to) return;
    FULL_DATA.steps.forEach(function(s) {
      totals[s.key] += (events[s.key] || 0);
    });
  });
  return totals;
}

function getDates(from, to) {
  var dates = [];
  var cur = from;
  while (cur <= to) { dates.push(cur); cur = isoAddDays(cur, 1); }
  return dates;
}

function renderAll() {
  var range  = getPeriodRange();
  var totals = computeTotals(range.from, range.to);
  var steps  = FULL_DATA.steps;

  document.getElementById('updated').textContent = FULL_DATA.updated;

  // KPIs
  var purchase  = totals['purchase']     || 0;
  var viewitem  = totals['view_item']    || 0;
  var checkout  = totals['begin_checkout'] || 0;
  var convRate  = viewitem ? parseFloat((purchase / viewitem * 100).toFixed(2)) : 0;

  document.getElementById('kpi-purchase').textContent    = fmt(purchase);
  document.getElementById('kpi-purchase-sub').textContent = n(purchase) + ' reservas';
  document.getElementById('kpi-conv').textContent        = convRate + '%';
  document.getElementById('kpi-checkout').textContent    = fmt(checkout);
  document.getElementById('kpi-checkout-sub').textContent = n(checkout) + ' checkouts';
  document.getElementById('kpi-viewitem').textContent    = fmt(viewitem);
  document.getElementById('kpi-viewitem-sub').textContent = n(viewitem) + ' fichas';

  // Detectar pasos con datos incompletos para el período
  var stepsWithWarning = {};
  steps.forEach(function(s) {
    var first = EVENT_FIRST[s.key];
    if (first && first > range.from) stepsWithWarning[s.key] = first;
  });
  var hasAnyWarning = Object.keys(stepsWithWarning).length > 0;

  // Banner de aviso global
  var bannerEl = document.getElementById('data-warning');
  if (!bannerEl) {
    bannerEl = document.createElement('div');
    bannerEl.id = 'data-warning';
    bannerEl.style.cssText = 'background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.3);border-radius:8px;padding:10px 16px;font-size:12px;color:#f59e0b;margin-bottom:16px;display:none';
    document.querySelector('.funnel-card').insertBefore(bannerEl, document.querySelector('.funnel-header'));
  }
  if (hasAnyWarning) {
    var warnedNames = steps.filter(function(s){ return stepsWithWarning[s.key]; }).map(function(s){ return s.label + ' (desde '+stepsWithWarning[s.key]+')'; });
    bannerEl.textContent = '⚠ Datos incompletos para el período seleccionado: ' + warnedNames.join(' · ') + '. Estos eventos se activaron recientemente y no cubren todo el rango.';
    bannerEl.style.display = 'block';
  } else {
    bannerEl.style.display = 'none';
  }

  // Funnel steps
  var maxCount = steps.reduce(function(m, s) { return Math.max(m, totals[s.key] || 0); }, 1);
  var html = '';
  steps.forEach(function(s, i) {
    var count    = totals[s.key] || 0;
    var prev     = i > 0 ? (totals[steps[i-1].key] || 0) : count;
    var rate     = prev > 0 ? parseFloat((count / prev * 100).toFixed(1)) : 0;
    var drop     = prev - count;
    var barW     = maxCount > 0 ? Math.max(2, Math.round(count / maxCount * 100)) : 0;
    var color    = STEP_COLORS[i] || '#6366f1';
    var rateHtml = i === 0
      ? '<span style="color:var(--muted);font-size:12px">—</span>'
      : '<span class="step-rate '+rateClass(rate)+'">'+rate+'%</span>';
    var dropHtml = i === 0
      ? '<span style="color:var(--muted);font-size:12px">—</span>'
      : drop >= 0
        ? '<span class="step-drop">−'+n(drop)+'</span>'
        : '<span class="step-drop" style="color:var(--green)">+'+n(-drop)+'</span>';

    html += '<div class="funnel-step">' +
      '<div><div class="step-label">'+(i+1)+'. '+s.label+'</div>' +
      '<div class="step-num">'+s.key+'</div></div>' +
      '<div class="bar-wrap"><div class="bar-fill" style="width:'+barW+'%;background:'+color+'"><span class="bar-label">'+fmt(count)+'</span></div></div>' +
      '<div class="step-count">'+n(count)+'</div>' +
      rateHtml +
      dropHtml +
      '</div>';
  });
  document.getElementById('funnel-steps').innerHTML = html;

  // Sparklines
  sparkCharts.forEach(function(c) { c.destroy(); });
  sparkCharts = [];
  var dates   = getDates(range.from, range.to);
  var gridHtml = '';
  steps.forEach(function(s, i) {
    var color   = STEP_COLORS[i] || '#6366f1';
    var count   = totals[s.key] || 0;
    var prev    = i > 0 ? (totals[steps[i-1].key] || 0) : count;
    var rate    = prev > 0 ? parseFloat((count / prev * 100).toFixed(1)) : 0;
    var rateStr = i === 0 ? '' : rate+'% conv.';
    gridHtml += '<div class="spark-card">' +
      '<div class="spark-label">'+(i+1)+'. '+s.label+'</div>' +
      '<div class="spark-count" style="color:'+color+'">'+fmt(count)+'</div>' +
      '<div class="spark-rate">'+rateStr+'</div>' +
      '<canvas class="spark" id="spark-'+i+'"></canvas>' +
      '</div>';
  });
  document.getElementById('trend-grid').innerHTML = gridHtml;

  steps.forEach(function(s, i) {
    var color  = STEP_COLORS[i] || '#6366f1';
    var counts = dates.map(function(d) { return (FULL_DATA.byDate[d] && FULL_DATA.byDate[d][s.key]) || 0; });
    var canvas = document.getElementById('spark-'+i);
    if (!canvas) return;
    var chart = new Chart(canvas, {
      type: 'line',
      data: {
        labels: dates.map(function(d) { return d.slice(5); }),
        datasets: [{ data: counts, borderColor: color, backgroundColor: color.replace(')', ',0.1)').replace('rgb', 'rgba'), borderWidth: 1.5, pointRadius: 0, tension: 0.3, fill: true }]
      },
      options: {
        responsive: false, maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: { enabled: false } },
        scales: { x: { display: false }, y: { display: false } },
        animation: false,
      }
    });
    sparkCharts.push(chart);
  });
}

function setPeriod(days) {
  activeDays = days;
  customFrom = null; customTo = null;
  document.getElementById('from-input').value = '';
  document.getElementById('to-input').value   = '';
  document.querySelectorAll('.period-btn[data-days]').forEach(function(b) {
    b.classList.toggle('active', parseInt(b.dataset.days) === days);
  });
  renderAll();
}

function setCustom() {
  var f = document.getElementById('from-input').value;
  var t = document.getElementById('to-input').value;
  if (!f || !t || f > t) return;
  customFrom = f; customTo = t;
  document.querySelectorAll('.period-btn[data-days]').forEach(function(b) { b.classList.remove('active'); });
  renderAll();
}

fetch('funnel-data.json?t=' + Date.now())
  .then(function(r) { return r.json(); })
  .then(function(d) {
    FULL_DATA = d;
    computeEventFirstDates();
    // Arrancar desde la primera fecha con todos los eventos activos
    customFrom = safeFromDate();
    customTo   = FULL_DATA.dateTo;
    document.getElementById('from-input').value = customFrom;
    document.getElementById('to-input').value   = customTo;
    document.querySelectorAll('.period-btn[data-days]').forEach(function(b) { b.classList.remove('active'); });
    renderAll();
    renderChannelButtons();
    renderDestTable();
    initChannelTooltip();
  })
  .catch(function(e) {
    document.querySelector('.main').innerHTML = '<div style="padding:48px;text-align:center;color:var(--muted)">Sin datos — ejecuta <code>node funnel-refresh.js</code></div>';
  });

// ── Tabla de destinos ──────────────────────────────────────────────────
var destSort = 'views', destDir = -1;
var destChannel = null; // null = Todos

var CHANNEL_DESC = {
  'Organic Search':   'Usuarios desde resultados orgánicos de Google, Bing u otros buscadores. Sin coste publicitario. Alta intención de búsqueda activa.',
  'Paid Search':      'Clics en anuncios de búsqueda de pago (Google Ads, Bing Ads). Usuarios que buscaron activamente y vieron un anuncio.',
  'Paid Social':      'Clics desde anuncios pagados en Meta (Facebook/Instagram), TikTok u otras redes sociales. Impacto publicitario en social.',
  'Direct':           'URL escrita directamente, marcadores, o tráfico cuyo origen no se pudo rastrear por falta de parámetros UTM.',
  'Unassigned':       'Sesiones sin canal identificable. Suele indicar etiquetado UTM incompleto o fuentes no reconocidas por GA4.',
  'Cross-network':    'Campañas de Google que publican simultáneamente en varios canales, como Performance Max o Smart Campaigns.',
  'Referral':         'Clics desde enlaces en webs externas: blogs, directorios, webs de socios, medios de comunicación u OTAs.',
  'Organic Social':   'Clics desde publicaciones orgánicas en redes sociales (Instagram, Facebook, TikTok). Sin inversión publicitaria.',
  'Email':            'Clics desde enlaces en correos electrónicos o campañas de email marketing.',
  'Paid Other':       'Publicidad de pago no clasificada como Search, Social ni Video. Puede incluir display, afiliados u otros canales.',
  'AI Assistant':     'Tráfico originado desde herramientas de IA como ChatGPT, Perplexity o Gemini que enlazan a Kampaoh.',
  'Organic Video':    'Clics desde vídeos orgánicos en YouTube u otras plataformas de vídeo. Sin inversión publicitaria.',
  'Paid Video':       'Clics desde anuncios de vídeo pagados: YouTube Ads, TrueView, bumpers, etc.',
  'Organic Shopping': 'Clics desde fichas gratuitas de Google Shopping. Tráfico de producto sin coste por clic.',
};

function sortDest(col) {
  destSort = col; destDir = (col === 'name') ? 1 : -1;
  renderDestTable();
}

function initChannelTooltip() {
  var tip  = document.getElementById('ch-tip');
  var wrap = document.getElementById('channel-filters');
  if (!tip || !wrap) return;
  wrap.addEventListener('mouseover', function(e) {
    var btn = e.target.closest('[data-tip]');
    if (!btn || !btn.dataset.tip) { tip.style.display = 'none'; return; }
    tip.textContent = btn.dataset.tip;
    tip.style.display = 'block';
  });
  wrap.addEventListener('mouseout', function(e) {
    if (!e.relatedTarget || !wrap.contains(e.relatedTarget)) tip.style.display = 'none';
  });
  document.addEventListener('mousemove', function(e) {
    if (tip.style.display === 'none') return;
    var x = e.clientX + 14, y = e.clientY - 8;
    if (x + 256 > window.innerWidth)  x = e.clientX - 256;
    if (y + 100 > window.innerHeight) y = e.clientY - 100;
    tip.style.left = x + 'px';
    tip.style.top  = y + 'px';
  });
}

function setDestChannel(ch) {
  destChannel = ch;
  document.querySelectorAll('.channel-btn').forEach(function(b) {
    var bCh = b.dataset.ch !== undefined ? b.dataset.ch : null;
    b.classList.toggle('active', bCh === ch);
  });
  renderDestTable();
}

function renderChannelButtons() {
  if (!FULL_DATA || !FULL_DATA.destinations) return;
  var channelViews = {};
  FULL_DATA.destinations.forEach(function(d) {
    Object.entries(d.channels || {}).forEach(function(entry) {
      var ch = entry[0], data = entry[1];
      if (!ch || ch === '(not set)') return;
      channelViews[ch] = (channelViews[ch] || 0) + (data.views || 0);
    });
  });
  var channels = Object.keys(channelViews).sort(function(a, b) {
    return channelViews[b] - channelViews[a];
  });
  var html = '<button class="channel-btn active" onclick="setDestChannel(null)">Todos los canales</button>';
  channels.forEach(function(ch) {
    var tip = (CHANNEL_DESC[ch] || '').replace(/"/g, '&quot;');
    html += '<button class="channel-btn" data-ch="' + ch + '" data-tip="' + tip + '" onclick="setDestChannel(\'' + ch.replace(/\\/g,'\\\\').replace(/'/g,"\\'") + '\')">' + ch + '</button>';
  });
  document.getElementById('channel-filters').innerHTML = html;
}

function renderDestTable() {
  if (!FULL_DATA || !FULL_DATA.destinations) return;

  var rows = FULL_DATA.destinations.map(function(d) {
    var views, purchases;
    if (destChannel) {
      var ch = (d.channels || {})[destChannel] || { views: 0, purchases: 0 };
      views = ch.views; purchases = ch.purchases;
    } else {
      views = d.views; purchases = d.purchases;
    }
    return {
      name:      d.name,
      views:     views,
      purchases: purchases,
      conv:      views > 0 ? parseFloat((purchases / views * 100).toFixed(2)) : 0,
    };
  });

  // Si hay filtro de canal, ocultar destinos sin datos en ese canal
  if (destChannel) {
    rows = rows.filter(function(r) { return r.views > 0 || r.purchases > 0; });
  }

  rows.sort(function(a, b) {
    var va = a[destSort], vb = b[destSort];
    if (typeof va === 'string') return destDir * va.localeCompare(vb, 'es');
    return destDir * (va - vb);
  });

  var total    = rows.length;
  var withBoth = rows.filter(function(r) { return r.views > 0 && r.purchases > 0; }).length;
  var chLabel  = destChannel ? ' · Canal: ' + destChannel : '';
  document.getElementById('dest-subtitle').textContent =
    FULL_DATA.dateFrom + ' → ' + FULL_DATA.dateTo + ' · ' + total + ' destinos' + chLabel + ' · ' + withBoth + ' con datos completos';

  var maxConv = rows.reduce(function(m, r) { return Math.max(m, r.conv); }, 0.01);

  function th(col, label) {
    var cls = destSort === col ? (destDir === 1 ? 'sort-asc' : 'sort-desc') : '';
    return '<th onclick="sortDest(\'' + col + '\')" class="' + cls + '">' + label + '</th>';
  }

  var thead = '<thead><tr>' + th('name','Destino') + th('views','Fichas vistas') + th('purchases','Reservas') + th('conv','Conv. %') + '<th style="width:72px;cursor:default"></th></tr></thead>';

  var tbody = rows.map(function(r) {
    var hasData  = r.views > 0 && r.purchases > 0;
    var convStr  = hasData ? r.conv + '%' : '<span style="color:var(--muted)">—</span>';
    var convCls  = r.conv >= 2 ? 'rate-good' : r.conv >= 0.5 ? 'rate-mid' : 'rate-bad';
    var barW     = hasData ? Math.round(r.conv / maxConv * 100) : 0;
    var barColor = r.conv >= 2 ? 'var(--green)' : r.conv >= 0.5 ? 'var(--orange)' : 'var(--red)';
    return '<tr>' +
      '<td style="font-weight:600">' + r.name + '</td>' +
      '<td>' + (r.views ? n(r.views) : '<span style="color:var(--muted)">—</span>') + '</td>' +
      '<td>' + (r.purchases ? n(r.purchases) : '<span style="color:var(--muted)">—</span>') + '</td>' +
      '<td class="' + (hasData ? convCls : '') + '">' + convStr + '</td>' +
      '<td><div class="conv-bar-wrap"><div class="conv-bar-fill" style="width:' + barW + '%;background:' + barColor + '"></div></div></td>' +
      '</tr>';
  }).join('');

  document.getElementById('dest-table-wrap').innerHTML =
    '<table class="dest-table">' + thead + '<tbody>' + tbody + '</tbody></table>';
}
</script>
<style>
:root {
  --bg:      #0f1117;
  --surface: #1a1d27;
  --surface2:#222536;
  --text:    #e2e4f0;
  --muted:   #6870a0;
  --border:  #2e3149;
  --accent:  #6366f1;
  --green:   #16a34a;
  --orange:  #f97316;
  --red:     #ef4444;
}
* { box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; font-size: 14px; margin: 0; }
header { background: var(--surface2); border-bottom: 1px solid var(--border); padding: 14px 32px; display: flex; justify-content: space-between; align-items: center; }
header h1 { font-size: 16px; font-weight: 900; color: var(--text); margin: 0; }
header h1 span { font-weight: 400; color: var(--muted); }
nav { background: var(--surface2); border-bottom: 1px solid var(--border); padding: 0 32px; display: flex; overflow-x: auto; }
.nav-link { padding: 10px 18px; font-size: 12px; font-weight: 600; color: var(--muted); text-decoration: none; border-bottom: 2px solid transparent; white-space: nowrap; }
.nav-link.active { color: var(--accent); border-bottom-color: var(--accent); }
.controls-bar { background: var(--surface2); border-bottom: 1px solid var(--border); padding: 10px 32px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.btn-group { display: flex; gap: 3px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 3px; }
.period-btn { padding: 5px 14px; font-size: 12px; font-weight: 600; background: transparent; border: none; color: var(--muted); border-radius: 6px; cursor: pointer; transition: all .15s; }
.period-btn.active { background: var(--accent); color: #fff; }
input[type="date"] { padding: 5px 10px; font-size: 12px; border: 1px solid var(--border); border-radius: 6px; background: var(--surface); color: var(--text); }
.date-sep { font-size: 12px; color: var(--muted); }
.main { max-width: 1100px; margin: 0 auto; padding: 24px 32px; }

/* KPIs */
.kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
.kpi-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px 20px; }
.kpi-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin-bottom: 6px; }
.kpi-val { font-size: 28px; font-weight: 800; color: var(--text); line-height: 1; }
.kpi-sub { font-size: 12px; color: var(--muted); margin-top: 4px; }

/* Funnel */
.funnel-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px 24px; margin-bottom: 24px; }
.funnel-header h2 { font-size: 14px; font-weight: 700; color: var(--text); margin: 0 0 16px; }
.funnel-step { display: grid; grid-template-columns: 180px 1fr 90px 60px 70px; gap: 12px; align-items: center; padding: 7px 0; border-bottom: 1px solid var(--border); }
.funnel-step:last-child { border-bottom: none; }
.step-label { font-size: 12px; font-weight: 600; color: var(--text); }
.step-num { font-size: 10px; color: var(--muted); }
.bar-wrap { background: var(--surface2); border-radius: 4px; height: 26px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 4px; display: flex; align-items: center; transition: width .3s; min-width: 2px; }
.bar-label { font-size: 11px; font-weight: 700; color: #fff; padding: 0 8px; white-space: nowrap; }
.step-count { font-size: 13px; font-weight: 700; color: var(--text); text-align: right; font-variant-numeric: tabular-nums; }
.step-rate { font-size: 12px; font-weight: 700; text-align: right; }
.rate-good { color: var(--green); }
.rate-mid  { color: var(--orange); }
.rate-bad  { color: var(--red); }
.step-drop { font-size: 12px; color: var(--muted); text-align: right; font-variant-numeric: tabular-nums; }

/* Sparklines */
.section-title { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 12px; }
.trend-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 10px; margin-bottom: 28px; }
.spark-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; }
.spark-label { font-size: 10px; font-weight: 600; color: var(--muted); margin-bottom: 2px; }
.spark-count { font-size: 20px; font-weight: 800; line-height: 1.1; }
.spark-rate { font-size: 10px; color: var(--muted); height: 14px; }
.spark { width: 100% !important; height: 40px !important; display: block; margin-top: 6px; }

/* Canal + tabla destinos */
.channel-filters { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
.channel-btn { padding: 4px 12px; font-size: 11px; font-weight: 600; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; color: var(--muted); cursor: pointer; transition: all .15s; }
.channel-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.channel-btn:hover:not(.active) { border-color: var(--accent); color: var(--accent); }
.dest-table { width: 100%; border-collapse: collapse; font-size: 13px; background: var(--surface); border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }
.dest-table th { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); padding: 10px 14px; border-bottom: 2px solid var(--border); text-align: left; cursor: pointer; user-select: none; background: var(--surface2); }
.dest-table th.sort-asc::after  { content: ' ↑'; }
.dest-table th.sort-desc::after { content: ' ↓'; }
.dest-table td { padding: 8px 14px; border-bottom: 1px solid var(--border); }
.dest-table tr:last-child td { border-bottom: none; }
.dest-table tr:hover td { background: var(--surface2); }
.conv-bar-wrap { background: var(--surface2); border-radius: 4px; height: 6px; overflow: hidden; width: 60px; }
.conv-bar-fill { height: 100%; border-radius: 4px; }

/* Tooltip canal */
#ch-tip { position: fixed; display: none; max-width: 260px; background: #1e2140; color: #f4f6ff; font-size: 11px; line-height: 1.5; padding: 8px 12px; border-radius: 8px; z-index: 9999; pointer-events: none; }

@media (max-width: 700px) {
  .kpi-row { grid-template-columns: repeat(2, 1fr); }
  .funnel-step { grid-template-columns: 120px 1fr 70px; }
  .funnel-step .step-rate, .funnel-step .step-drop { display: none; }
  .main { padding: 16px; }
}
</style>
</head>
